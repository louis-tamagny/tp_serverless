version: '3.8'
services:
  minio:
    image: minio/minio
    container_name: minio2
    environment:
      MINIO_ROOT_USER: your-access-key
      MINIO_ROOT_PASSWORD: your-secret-key
    ports:
      - "9000:9000"  # API MinIO
      - "9001:9001"  # Console d'administration graphique MinIO
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"


